name: Generate snake

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main, master ]
    paths: [ '.github/workflows/user-stats.yml' ]
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: cfkoehler
          outputs: |
            images/github-contribution-grid-snake.svg
            images/github-contribution-grid-snake-dark.svg?palette=github-dark

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/github-contribution-grid-snake*.svg
          git diff --cached --quiet || git commit -m "Generate contribution snake [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
