name: Profile metrics

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main, master ]
    paths: [ '.github/workflows/user-stats.yml' ]
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # Requires a PAT stored as METRICS_TOKEN secret (public_repo + read:user scope).
      # Generate one at https://github.com/settings/tokens and add it in repo Settings > Secrets.
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: images/metrics.svg
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: America/Chicago

  snake:
    runs-on: ubuntu-latest
    needs: metrics
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: Platane/snk@v3
        with:
          github_user_name: cfkoehler
          outputs: |
            images/github-contribution-grid-snake.svg
            images/github-contribution-grid-snake-dark.svg?palette=github-dark

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add images/github-contribution-grid-snake*.svg
          git diff --cached --quiet || git commit -m "Generate contribution snake [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
